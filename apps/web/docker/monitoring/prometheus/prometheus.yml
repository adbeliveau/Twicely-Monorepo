global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: twicely-app
    scheme: http
    metrics_path: /api/metrics
    authorization:
      credentials_file: /etc/prometheus/metrics_secret
    static_configs:
      - targets:
          - host.docker.internal:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: twicely-app

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
