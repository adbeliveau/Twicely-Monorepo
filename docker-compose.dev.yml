# Twicely V4 — Local Development Services
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Services:
#   - OpenSearch 2.17.1 (port 9200) — Decision #143
#   - OpenSearch Dashboards (port 5601) — optional admin UI
#   - Typesense 27.0 (port 8108) — legacy, kept for dual-write migration
#   - Valkey 8 (port 6379) — BullMQ job queues + session cache
#
# PostgreSQL is expected to be provided by Supabase CLI or a separate container.

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: twicely-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: twicely-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  typesense:
    image: typesense/typesense:27.0
    container_name: twicely-typesense
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-twicely-dev-key}
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8
    container_name: twicely-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    restart: unless-stopped

volumes:
  opensearch-data:
  typesense-data:
  valkey-data:
