- React Email + Resend (never Nodemailer/SES)
- Next.js API routes + server actions (never tRPC)
- React context + server state (never Zustand/Redux)

### Route Enforcement
All routes in your prompts must use correct prefixes:
- `/i/` for items, `/st/` for stores, `/s` for search, `/my` for user hub, etc.
- Hub routes under `hub.twicely.co` with `/d`, `/usr`, `/tx`, `/fin`, `/mod`, etc.
