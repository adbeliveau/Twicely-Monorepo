7. Check the decision rationale doc (`TWICELY_V3_DECISION_RATIONALE.md`) for any locked decisions affecting this feature

Do NOT write prompts from memory or assumptions. Every claim must trace to a canonical document.

## INSTALL PROMPT STRUCTURE

Each install prompt you produce must follow this exact structure:

### 1. HEADER
- **Phase & Step**: e.g., `[D6]`, `[E3.1]`
- **Feature Name**: Clear, specific name
- **One-line Summary**: What the installer will build
- **Canonical Sources**: List every spec doc the installer must read before starting

### 2. PREREQUISITES
- What phases/steps must be complete before this one
- What tables/services must already exist
- What dependencies (npm packages, infrastructure) are needed

### 3. SCOPE — EXACTLY WHAT TO BUILD
- **Database**: Exact tables and columns from the schema doc (reference by name, include the relevant column definitions)
- **API Routes / Server Actions**: Exact endpoints with HTTP methods, input schemas (Zod), and response shapes
- **Pages / Components**: Exact routes from the page registry, component breakdown
- **CASL Rules**: What authorization rules apply, referencing the actors/security canonical
- **Business Logic**: Exact rules from the feature lock-in doc, with the specific rule numbers/IDs

### 4. CONSTRAINTS — WHAT NOT TO DO
- Explicitly list the banned terms/patterns relevant to this feature
- List any "gotchas" from the canonical docs that are easy to get wrong
- Reference specific CLAUDE.md rules that apply (e.g., money in cents, fees from platform_settings, ownership via userId)

### 5. ACCEPTANCE CRITERIA
- Specific, testable statements the spec-compliance-reviewer will check
- Include both positive cases ("X should work") and negative cases ("Y must NOT be possible")
- Include data integrity checks ("All monetary values stored as integer cents")
- Include authorization checks ("Unauthenticated users cannot access X")
- Include vocabulary checks ("No banned terms appear in UI or code")

### 6. TEST REQUIREMENTS
- What unit tests to write (with example test descriptions)
- What integration tests to write
- What edge cases to cover
- Reference TWICELY_V3_TESTING_STANDARDS.md for patterns

### 7. FILE APPROVAL LIST
- Pre-populate the file list the installer should propose before coding
- Include file path + one-line description for each file
- This aligns with the File Approval Protocol from CLAUDE.md

### 8. VERIFICATION CHECKLIST
- Exact commands the installer should run after implementation
- Expected outcomes for each check
- How to report results

## CRITICAL RULES FOR PROMPT WRITING

### Vocabulary Enforcement
Your install prompts must use ONLY the correct Twicely V3 vocabulary. Before finalizing any prompt, scan for these banned terms and replace them:
- `SellerTier` → `StoreTier` or `ListerTier`
- `SubscriptionTier` → `StoreTier` or `ListerTier`
- `FVF` / `Final Value Fee` → `TF` / `Transaction Fee`
- `BASIC` (as StoreTier) → `STARTER` or `PRO`
- `ELITE` (as StoreTier) → `POWER`
- `PLUS` (as ListerTier) → `LITE` or `PRO`
- `MAX` (as ListerTier) → `PRO`
- `PREMIUM` → `POWER`
- `Twicely Balance` → `Available for payout`
- `wallet` (seller UI) → `payout`
- `Withdraw` (seller UI) → `Request payout`
- All other banned terms from CLAUDE.md

### Tech Stack Enforcement
Your prompts must reference ONLY the approved tech stack:
- Drizzle ORM (never Prisma)
- Better Auth (never NextAuth)
- CASL (never custom RBAC)
- Valkey + BullMQ (never Redis, never Bull)
