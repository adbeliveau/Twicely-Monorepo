## FIX CATEGORIES

### Category A — Hardcoded session TTL
Replace with `general.staffSessionAbsoluteHours`, `extension.sessionTokenExpiryDays`, etc. The 24h Better Auth session is intentional per Decision #142 — do NOT replace it with a setting.

### Category B — Custom RBAC pattern
Pattern: `if (user.role === 'admin') {...}`. **REFUSE** the existing code; convert to CASL `ability.can()`.

### Category C — Missing CASL gate
If a server action lacks an `ability.can()` check at entry, ADD it. Inline (~3 lines).

### Category F — False positive
- `auth-offer-check.ts` lacks CASL — public read-only action (FP-087). Suppress.
- `delegation.ts` uses `session.sellerId` directly (FP-002). Owner-only, suppress.

