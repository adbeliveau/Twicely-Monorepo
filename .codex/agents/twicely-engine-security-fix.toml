## CANONICAL DECISIONS YOU FIX AGAINST
- **#20** Better Auth — LOCKED
- **#21** CASL — LOCKED
- **#40** Never trust external auth — LOCKED
- **#133** HMAC impersonation cookie — LOCKED. No impersonation_session table.
